<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机转盘 - 设置</title>
    <link rel="stylesheet" href="setting.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>随机转盘 · 设置</h1>
            <button id="back-to-popup">← 返回转盘</button>
        </header>

        <!-- 左右布局核心容器 -->
        <div class="split-layout">
            <!-- 左侧编辑区 -->
            <section class="edit-section">
                <!-- 转动次数 -->
                <div class="spin-count">
                    <label for="spinCount">本次转动次数：</label>
                    <input type="number" id="spinCount" min="1" max="10" value="3">
                </div>

                <!-- 条目列表头部 -->
                <div class="items-header">
                    <h3>📋 选项条目列表 <span id="item-count">(0)</span></h3>
                    <button id="add-item">+ 新增条目</button>
                </div>

                <!-- 条目动态列表（可滚动） -->
                <ul id="items-list" class="items-list"></ul>

                <!-- 底部操作按钮组 -->
                <div class="edit-actions">
                    <button id="save-current" class="primary-btn">✅ 确定（保存并生效到转盘）</button>
                    <button id="collect-preset" class="secondary-btn">⭐ 收藏为新方案</button>
                </div>
            </section>

            <!-- 右侧方案管理区 -->
            <section class="preset-section">
                <!-- 上一次方案区域（高度30%） -->
                <h3>📌 上一次方案</h3>
                <div class="last-used-container" id="last-used-container">
                    
                    <div id="last-used-content" class="preset-card" style="border: none; background: transparent; box-shadow: none; margin-bottom: 0;">
                        <p>加载中...</p>
                    </div>
                </div>

                <!-- 所有收藏方案列表（填充剩余高度） -->
                 <h3>📌 收藏</h3>
                <div class="preset-list" id="preset-list">
                    <!-- 动态生成 -->
                </div>
            </section>
        </div>
    </div>

    <script type="module" src="setting.js"></script>
</body>
</html>
